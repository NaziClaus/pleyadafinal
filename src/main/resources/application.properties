spring.application.name=sftpclient
# DataSource configuration via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# Prometheus metrics
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# SFTP properties
sftp.host=${SFTP_HOST}
sftp.port=${SFTP_PORT:22}
sftp.username=${SFTP_USERNAME}
sftp.password=${SFTP_PASSWORD}
sftp.remote-path=${SFTP_REMOTE_PATH:/}
local.download-dir=${LOCAL_DOWNLOAD_DIR:downloads}
csv.log-path=${CSV_LOG_PATH:downloads/log.csv}
